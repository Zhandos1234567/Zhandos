<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Car Animation 3 D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}


.sky {
  position: absolute;
  width: 100%;
  height: 70%;
  background: linear-gradient(#87ceeb, #e0f7ff);
}


.sun {
  width: 80px;
  height: 80px;
  background: yellow;
  border-radius: 50%;
  position: absolute;
  top: 40px;
  right: 80px;
}


.road {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 30%;
  background: #333;
  overflow: hidden;
}


.line {
  position: absolute;
  width: 200%;
  height: 5px;
  background: white;
  top: 50%;
  animation: moveLine 1s linear infinite;
}


.car-container {
  position: absolute;
  bottom: 60px;
  left: -250px;
  display: flex;
  align-items: center;
  animation: drive 5s linear infinite;
}

.car-body {
  width: 200px;
  height: 80px;
  background: #3498db;
  border-radius: 15px;
  position: relative;
}


.wheel {
  width: 50px;
  height: 50px;
  background: #222;
  border-radius: 50%;
  border: 6px solid #555;
  position: absolute;
  bottom: -25px;
  display: flex;
  align-items: center;
  justify-content: center;
  transform-origin: center;
  animation: spin 0.5s linear infinite;
}


.wheel::before {
  content: "";
  width: 20px;
  height: 20px;
  background: silver;
  border-radius: 50%;
}


.wheel::after {
  content: "";
  width: 4px;
  height: 40px;
  background: white;
  position: absolute;
}


.front { right: 10px; }
.back { left: 10px; }


button {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}


@keyframes drive {
  0% { left: -250px; }
  100% { left: 100%; }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes moveLine {
  from { left: 10; }
  to { left: -100%; }
}
</style>
</head>

<body>

<div class="sky">
  <div class="sun"></div>
</div>

<div class="road">
  <div class="line"></div>
</div>

<button onclick="toggle()">⏯ Тоқтат / Жүргіз</button>


<div class="car-container" id="car">
  <div class="car-body">
    <div class="wheel front"></div>
    <div class="wheel back"></div>
  </div>
</div>

<script>
let running = true;

function toggle() {
  const car = document.getElementById("car");
  const wheels = document.querySelectorAll(".wheel");
  const line = document.querySelector(".line");

  running = !running;

  car.style.animationPlayState = running ? "running" : "paused";
  line.style.animationPlayState = running ? "running" : "paused";

  wheels.forEach(w => {
    w.style.animationPlayState = running ? "running" : "paused";
  });
}
</script>

</body>
</html
